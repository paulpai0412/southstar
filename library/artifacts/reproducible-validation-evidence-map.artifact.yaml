validationRules:
  - "Must include at least two executions of the same verification command set with captured exit codes and success status."
  - "Must assert exit code consistency across reruns and include supporting command-output evidence."
  - "Must include requirement-to-evidence mapping entries for each blocking requirement under validation scope."
  - "Must include file-diff or equivalent change trace evidence tied to validated test runs."
  - "Must include workspace-snapshot and artifact-ref links sufficient to reproduce and inspect the validation state."
schemaRef: "southstar.software.reproducible_validation_evidence_map.v1"
requiredFields:
  - "validationRunId"
  - "commandSet"
  - "rerunResults"
  - "exitCodeConsistency"
  - "requirementEvidenceMap"
  - "coverageSummary"
  - "evidenceRefs"
  - "generatedAt"
provenanceRequirements:
  - "Record deterministic command argv arrays and execution environment identifiers."
  - "Record rerun sequence order and timestamps for reproducibility audits."
  - "Record mapping provenance from requirement entries to concrete evidence references."
