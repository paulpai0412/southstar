  - "postSubmitWithoutReloadScreenshot"
  - "postReloadScreenshot"
  - "interactionEvidenceArtifactRef"
  - "assertionSummary"
provenanceRequirements:
  - "Evidence must be captured from a real browser interaction session against the evaluated web app URL."
  - "All screenshots and URL evidence must originate from the same evaluation run context."
  - "The interactionEvidenceArtifactRef must resolve to immutable replayable execution evidence for the same run."
  - "Captured evidence must preserve phase order: initial load, submit/update without reload, then explicit reload check."
