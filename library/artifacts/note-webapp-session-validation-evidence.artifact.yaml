validationRules:
  - "Must include URL evidence showing direct entry to the target web app without an authentication gate."
  - "Must include screenshot evidence for initial page state showing note input and note list regions in one interface."
  - "Must include screenshot evidence showing a submitted note appearing in the list without a page reload."
  - "Must include screenshot evidence after explicit reload showing session-only note data is not retained."
  - "Must include an artifact-ref to replayable interaction/output evidence that links the observed states and assertions."
schemaRef: "southstar.artifact.note_webapp_session_validation_evidence.v1"
