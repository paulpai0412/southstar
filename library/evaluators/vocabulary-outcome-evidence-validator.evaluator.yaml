schemaVersion: southstar.library.evaluator_profile_file.v1
id: evaluator.vocabulary-outcome-evidence-validator
title: "Vocabulary Outcome Evidence Evaluator"
scope: "software"
status: approved
validatesArtifactRefs:
  - "artifact.vocabulary-outcome-evidence"
requiredInputs:
  - "artifact.vocabulary-outcome-evidence instance"
  - "file-diff evidence"
  - "test-result evidence"
  - "command-output evidence"
  - "workspace-snapshot evidence"
  - "url evidence"
  - "screenshot evidence"
  - "artifact-ref evidence"
evidenceKinds:
  - "file-diff"
  - "test-result"
  - "command-output"
  - "workspace-snapshot"
  - "url"
  - "screenshot"
  - "artifact-ref"
verificationModes:
  - "deterministic"
  - "browser_interaction"
  - "semantic_review"
verificationProcedures:
  - id: "entry-persistence-verification"
    checkKind: "deterministic"
    instruction: "Verify add/list implementation and tests prove persisted vocabulary entries with word, translation, and example survive process restart on local storage."
    allowedEvidenceKinds:
      - "file-diff"
      - "test-result"
      - "command-output"
      - "workspace-snapshot"
  - id: "quiz-history-and-accuracy-verification"
    checkKind: "deterministic"
    instruction: "Verify quiz answer submission is persisted and retrievable, and verify session plus cumulative accuracy calculations are correct from persisted history."
    allowedEvidenceKinds:
      - "file-diff"
      - "test-result"
      - "command-output"
      - "workspace-snapshot"
  - id: "ui-workflow-verification"
    checkKind: "browser_interaction"
    instruction: "Verify locally hosted UI route availability and screenshots for add/list, quiz answering, and accuracy visibility workflows."
    allowedEvidenceKinds:
      - "url"
      - "screenshot"
      - "file-diff"
      - "command-output"
  - id: "domain-artifact-evidence-separation-check"
    checkKind: "semantic_review"
    instruction: "Verify the artifact instance is used as explicit product evidence and contains persisted answers plus both accuracy scopes, distinct from generic repo/test evidence bundles."
    allowedEvidenceKinds:
      - "artifact-ref"
      - "command-output"
      - "file-diff"
      - "workspace-snapshot"
independencePolicy: "independent"
resultSchemaRef: "southstar.requirement_evaluator_result.v2"
failureClassifications:
  - "artifact-schema-nonconformance"
  - "missing-required-evidence"
  - "entry-persistence-not-demonstrated"
  - "quiz-history-not-persisted"
  - "accuracy-not-verified"
  - "ui-workflow-not-demonstrated"
  - "artifact-evidence-separation-not-demonstrated"
importDraftId: "library-import-goal-72ff3dbbd140eea225fa74f6569ce9af"
importCandidateKey: "evaluator.vocabulary-outcome-evidence-validator"
importSourcePath: "Confirmed-Goal-validation-gaps.md"
