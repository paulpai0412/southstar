schemaVersion: southstar.library.evaluator_profile_file.v1
id: evaluator.software-engineering-general
title: "Software Engineering General Evaluator"
scope: "software"
status: approved
description: "Reusable evaluator profile for verifying software requirements across contracts, implementation, behavior, data, persistence, security, user interaction, and evidence consistency."
semanticTags:
  - "software-engineering"
  - "software-quality"
  - "verification"
  - "test-integrity"
  - "data-correctness"
  - "persistence"
  - "security"
  - "ui-behavior"
validatesArtifactRefs:
  - "artifact.software-validation-evidence-bundle"
  - "artifact.reproducible-validation-evidence-map"
requiredInputs:
  - "requirementContract"
  - "criteriaSet"
  - "artifact-ref"
  - "evidenceRefs"
evidenceKinds:
  - "file-diff"
  - "test-result"
  - "command-output"
  - "url"
  - "screenshot"
  - "human-approval"
  - "artifact-ref"
  - "workspace-snapshot"
  - "policy-decision"
verificationModes:
  - "deterministic"
  - "browser_interaction"
  - "semantic_review"
  - "human_approval"
verificationProcedures:
  - id: "procedure.contract-and-test-integrity"
    checkKind: "deterministic"
    instruction: "Validate the declared contract and schema, execute the required automated checks, and confirm the recorded result is tied to the exact requirement criteria and source revision."
    allowedEvidenceKinds:
      - "file-diff"
      - "test-result"
      - "command-output"
      - "artifact-ref"
      - "workspace-snapshot"
  - id: "procedure.api-and-behavior-contract"
    checkKind: "deterministic"
    instruction: "Exercise the declared API or service behavior and compare actual responses, state transitions, and failure handling with the observable Criterion claim."
    allowedEvidenceKinds:
      - "test-result"
      - "command-output"
      - "url"
      - "artifact-ref"
      - "workspace-snapshot"
  - id: "procedure.data-invariant-reconciliation"
    checkKind: "deterministic"
    instruction: "Recompute declared data invariants or aggregates from the captured records and reconcile them with the system output without relying on an unverified summary."
    allowedEvidenceKinds:
      - "test-result"
      - "command-output"
      - "artifact-ref"
      - "workspace-snapshot"
  - id: "procedure.persistence-idempotency-recovery"
    checkKind: "deterministic"
    instruction: "Verify persistence across the required lifecycle boundary, repeated equivalent requests, restart or recovery when claimed, and the absence of duplicate or stale state."
    allowedEvidenceKinds:
      - "file-diff"
      - "test-result"
      - "command-output"
      - "artifact-ref"
      - "workspace-snapshot"
  - id: "procedure.authorization-and-security"
    checkKind: "deterministic"
    instruction: "Verify authorization decisions, protected boundaries, input or policy constraints, and denial behavior using the declared security evidence and without inferring success from implementation presence alone."
    allowedEvidenceKinds:
      - "test-result"
      - "command-output"
      - "policy-decision"
      - "artifact-ref"
      - "workspace-snapshot"
  - id: "procedure.browser-interaction"
    checkKind: "browser_interaction"
    instruction: "Use the official playwright-cli directly in the evaluator runtime. Start with playwright-cli open <url> --browser chromium, perform the frozen user journey in that session, inspect visible state with snapshot, find, eval, run-code, screenshot, or console commands, and capture the required URL and screenshot evidence. Do not report a browser result from source inspection or unexecuted command text."
    allowedEvidenceKinds:
      - "screenshot"
      - "url"
      - "test-result"
      - "command-output"
      - "artifact-ref"
  - id: "procedure.semantic-cross-evidence"
    checkKind: "semantic_review"
    instruction: "Review the Criterion meaning and determine whether implementation, execution results, artifacts, workspace state, and policy evidence collectively support the same observable claim without contradiction."
    allowedEvidenceKinds:
      - "file-diff"
      - "test-result"
      - "command-output"
      - "artifact-ref"
      - "workspace-snapshot"
      - "policy-decision"
  - id: "procedure.human-assurance-gate"
    checkKind: "human_approval"
    instruction: "Verify that the required human assurance or risk decision is explicit, attributable, current for the same revision, and supported by the referenced evidence rather than replacing missing deterministic checks."
    allowedEvidenceKinds:
      - "human-approval"
      - "policy-decision"
      - "artifact-ref"
      - "workspace-snapshot"
independencePolicy: "independent"
resultSchemaRef: "southstar.requirement_evaluator_result.v2"
failureClassifications:
  - "contract-schema-mismatch"
  - "test-result-missing-or-failed"
  - "behavior-contract-failed"
  - "data-invariant-mismatch"
  - "persistence-or-idempotency-failed"
  - "authorization-or-policy-failed"
  - "browser-observation-mismatch"
  - "semantic-evidence-conflict"
  - "human-assurance-missing-or-stale"
  - "missing-required-evidence"
  - "evidence-integrity-failure"
