verificationProcedures:
  - id: "expense-entry-ui-and-input-guard"
    checkKind: "browser_interaction"
    instruction: "Verify a valid expense submission appears in the visible ledger with consistent values and verify invalid amount input is blocked with corrective feedback using browser-path evidence and automated checks."
    allowedEvidenceKinds:
      - "screenshot"
      - "test-result"
      - "url"
  - id: "balance-and-summary-reconciliation"
    checkKind: "deterministic"
    instruction: "Recompute balance, daily totals, and monthly totals from the artifact ledger entries and compare against reported snapshots and UI-visible summaries for consistency."
    allowedEvidenceKinds:
      - "artifact-ref"
      - "screenshot"
      - "test-result"
  - id: "persistence-roundtrip-continuity"
    checkKind: "deterministic"
    instruction: "Validate at least one complete write-read-reload cycle by comparing before/after ledger and balance states, corroborated by execution logs and workspace persistence evidence."
    allowedEvidenceKinds:
      - "artifact-ref"
      - "command-output"
      - "test-result"
      - "workspace-snapshot"
independencePolicy: "independent"
resultSchemaRef: "southstar.requirement_evaluator_result.v2"
failureClassifications:
  - "missing-evidence"
  - "artifact-schema-invalid"
  - "entry-list-inconsistency"
  - "invalid-input-guard-missing"
  - "balance-reconciliation-failed"
  - "summary-reconciliation-failed"
  - "persistence-roundtrip-failed"
