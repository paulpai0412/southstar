workflow:
  id: invalid_fixture
  version: "1.0"
  roles:
    worker:
      run_mode: background_child
      agent: build
      load_skills:
        - tdd
      artifact: worker_result
      timeout_seconds: 30
      retry_policy:
        max_attempts: 2
        backoff_seconds:
          - 5
  stages:
    implementation:
      lifecycle_state: running
      role: worker
      on_success: verification
