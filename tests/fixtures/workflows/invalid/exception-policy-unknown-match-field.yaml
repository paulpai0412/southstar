workflow:
  id: invalid_fixture
  version: "1.0"
  roles:
    worker:
      run_mode: background_child
      agent: build
      load_skills:
        - tdd
      artifact: worker_result
      timeout_seconds: 30
  stages:
    implementation:
      lifecycle_state: running
      role: worker
      on_success: completed
  exception_policy:
    rules:
      - name: bad_match
        match:
          unsupported: value
        action:
          type: quarantine
    default:
      action:
        type: quarantine
