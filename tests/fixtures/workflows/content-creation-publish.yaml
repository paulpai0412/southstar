workflow:
  id: content_creation_publish
  version: "1.0"
  domain: content_creation
  artifact_schemas:
    draft_article:
      required_fields:
        - summary
        - title
        - body_text
    editorial_packet:
      required_fields:
        - summary
        - review_notes
        - retryable
    approval_packet:
      required_fields:
        - summary
        - approved
    publish_result:
      required_fields:
        - summary
        - published_url
        - confirmed_delivery
  event_mappings:
    cms_publish_complete:
      runtime_event: effect_result
      effect_type: publish_content
    calendar_sync_failed:
      runtime_event: projection_result
      projection_target: content_calendar
  effects:
    publish_content:
      adapter: content_publisher
      retryable: true
    sync_content_calendar:
      adapter: projection
      retryable: true
  projection_targets:
    content_calendar:
      adapter: local_report
    editorial_dashboard:
      adapter: local_report
  roles:
    writer:
      run_mode: background_child
      agent: writer
      load_skills:
        - drafting
      artifact: draft_article
      timeout_seconds: 3600
      retry_policy:
        max_attempts: 2
        backoff_seconds:
          - 60
    editor:
      run_mode: background_child
      agent: editor
      load_skills:
        - editorial-review
      artifact: editorial_packet
      timeout_seconds: 1800
      retry_policy:
        max_attempts: 2
        backoff_seconds:
          - 60
    approver:
      run_mode: manual_gate
      agent: manager
      load_skills:
        - approval-gate
      artifact: approval_packet
      timeout_seconds: 86400
    publisher:
      run_mode: background_child
      agent: publisher
      load_skills:
        - publish-content
      artifact: publish_result
      timeout_seconds: 900
      retry_policy:
        max_attempts: 3
        backoff_seconds:
          - 60
          - 300
  stages:
    draft:
      lifecycle_state: running
      role: writer
      on_success: editorial_review
      on_failed_retryable: draft
      on_failed_terminal: failed
    editorial_review:
      lifecycle_state: verifying
      role: editor
      on_success: approval
      on_fail_retryable: draft
      on_fail_terminal: failed
    approval:
      lifecycle_state: verified
      role: approver
      on_pass: publish
      on_fail_retryable: draft
      on_fail_terminal: failed
    publish:
      lifecycle_state: releasing
      role: publisher
      on_success: completed
      on_blocked_transient: verified
      on_failed_terminal: failed
