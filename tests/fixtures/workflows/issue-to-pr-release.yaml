workflow:
  id: issue_to_pr_release
  version: "2.0"
  domain: software_development

  roles:
    implementation_agent:
      run_mode: background_child
      agent: build
      model: gpt-5
      load_skills: []
      prompt_template: "Implement {{issue_title}} from {{issue_body}}. Northstar will provide task JSON and expects {{expected_artifact_fields}}."
      artifact: implementation_result
      timeout_seconds: 7200
      retry_policy:
        max_attempts: 2
        backoff_seconds:
          - 30
          - 120

    verifier_agent:
      run_mode: background_child
      agent: review
      model: gpt-5
      load_skills: []
      artifact: verification_result
      timeout_seconds: 7200

    release_agent:
      run_mode: background_child
      agent: release
      model: gpt-5
      load_skills: []
      artifact: release_result
      timeout_seconds: 3600

  stages:
    implementation:
      lifecycle_state: running
      role: implementation_agent
      on_success: verification

    verification:
      lifecycle_state: verifying
      role: verifier_agent
      on_pass: verified
      on_success: verified

    release:
      lifecycle_state: releasing
      role: release_agent
      on_success: completed

  exception_policy:
    max_recovery_attempts_from: runtime.max_recovery_attempts
    rules:
      - name: implementation_retryable_retries_implementation
        match:
          source_stage: implementation
          artifact_kind: implementation_result
          status: failed_retryable
        action:
          type: retry_stage
          target_stage: implementation
        on_exhausted:
          type: quarantine

      - name: verification_retryable_returns_to_implementation
        match:
          source_stage: verification
          artifact_kind: verification_result
          status: failed_retryable
        action:
          type: return_to_stage
          target_stage: implementation
          carry_forward:
            - feedback_for_implementation
        on_exhausted:
          type: quarantine

      - name: release_retryable_retries_release
        match:
          source_stage: release
          artifact_kind: release_result
          status: failed_retryable
        action:
          type: retry_stage
          target_stage: release
        on_exhausted:
          type: quarantine

      - name: artifact_validation_retries_same_stage
        match:
          category: artifact_validation
        action:
          type: retry_same_stage
        on_exhausted:
          type: quarantine

      - name: runtime_invariant_missing_child_run_retries_stage
        match:
          category: runtime_invariant
          summary: active_issue_missing_child_run
        action:
          type: retry_same_stage
        on_exhausted:
          type: quarantine

      - name: runtime_invariant_invalid_owner_lease_retries_stage
        match:
          category: runtime_invariant
          summary: active_issue_invalid_owner_lease
        action:
          type: retry_same_stage
        on_exhausted:
          type: quarantine

      - name: runtime_invariant_host_liveness_loss_retries_stage
        match:
          category: runtime_invariant
          summary: host_liveness_lost
        action:
          type: retry_same_stage
        on_exhausted:
          type: quarantine

      - name: worker_artifact_rejected_retries_implementation
        match:
          category: runtime_invariant
          summary: worker_artifact_rejected_retryable
        action:
          type: retry_same_stage
        on_exhausted:
          type: quarantine

      - name: verifier_artifact_rejected_returns_to_implementation
        match:
          category: runtime_invariant
          summary: artifact_rejected_retryable
        action:
          type: return_to_stage
          target_stage: implementation
          carry_forward:
            - error
        on_exhausted:
          type: quarantine

      - name: blocked_requires_operator
        match:
          status: blocked
        action:
          type: quarantine

      - name: terminal_agent_failure_requires_operator
        match:
          status: failed_terminal
        action:
          type: quarantine

    default:
      action:
        type: quarantine
